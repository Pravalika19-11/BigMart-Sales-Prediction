<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BigMart Sales Prediction</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">

    <style>
        body {
            background-image: url("{{ url_for('static', filename='store_bg.jpg') }}");
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: white;
            font-family: Arial, sans-serif;
        }
        .nav-links {
            text-align: right;
            padding: 15px;
        }
        .nav-links a {
            color: white;
            text-decoration: none;
            margin: 15px;
            font-size: 18px;
            font-weight: bold;
        }
        .container-box {
            background: rgba(0, 0, 0, 0.75);
            padding: 30px;
            border-radius: 10px;
            margin-top: 50px;
            text-align: center;
        }
        .btn-custom {
            background-color: #28a745;
            color: white;
            font-weight: bold;
            border-radius: 5px;
            width: 100%;
        }
        .btn-custom:hover {
            background-color: #218838;
        }
        .prediction-result {
            margin-top: 20px;
            font-size: 22px;
            font-weight: bold;
            color: #ffcc00;
        }
        .result-buttons {
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <!-- Navigation Menu -->
    <div class="nav-links">
        <a href="/">Home</a>
        <a href="/predict">Check Sales</a>
        <a href="/performance">Performance Analysis</a>
    </div>

    <div class="container">
        <div class="container-box">
            <h1>BigMart Sales Prediction</h1>
            <p>Predict sales, analyze performance, and visualize data trends.</p>

            <!-- Prediction Form -->
            <form action="/predict" method="post">
                <div class="row">
                    <div class="col-md-6">
                        <label>Item Weight</label>
                        <input type="number" step="0.01" name="Item_Weight" class="form-control" required>

                        <label>Item Fat Content</label>
                        <select name="Item_Fat_Content" class="form-control">
                            <option value="Low Fat">Low Fat</option>
                            <option value="Regular">Regular</option>
                        </select>

                        <label>Item Visibility</label>
                        <input type="number" step="0.01" name="Item_Visibility" class="form-control" required>

                        <label>Item Type</label>
                        <select name="Item_Type" class="form-control">
                            <option value="Dairy">Dairy</option>
                            <option value="Soft Drinks">Soft Drinks</option>
                            <option value="Fruits and Vegetables">Fruits and Vegetables</option>
                            <option value="Household">Household</option>
                        </select>
                    </div>

                    <div class="col-md-6">
                        <label>Item MRP</label>
                        <input type="number" step="0.01" name="Item_MRP" class="form-control" required>

                        <label>Outlet Establishment Year</label>
                        <input type="number" name="Outlet_Establishment_Year" class="form-control" required>

                        <label>Outlet Size</label>
                        <select name="Outlet_Size" class="form-control">
                            <option value="Small">Small</option>
                            <option value="Medium">Medium</option>
                            <option value="High">High</option>
                        </select>

                        <label>Outlet Location Type</label>
                        <select name="Outlet_Location_Type" class="form-control">
                            <option value="Tier 1">Tier 1</option>
                            <option value="Tier 2">Tier 2</option>
                            <option value="Tier 3">Tier 3</option>
                        </select>

                        <label>Outlet Type</label>
                        <select name="Outlet_Type" class="form-control">
                            <option value="Supermarket Type1">Supermarket Type1</option>
                            <option value="Supermarket Type2">Supermarket Type2</option>
                            <option value="Supermarket Type3">Supermarket Type3</option>
                            <option value="Grocery Store">Grocery Store</option>
                        </select>

                        <label>Select Model</label>
                        <select name="model" class="form-control">
                            <option value="linear">Linear Regression</option>
                            <option value="polynomial">Polynomial Regression</option>
                            <option value="ridge">Ridge Regression</option>
                            <option value="xgboost">XGBoost Regression</option>
                        </select>
                    </div>
                </div>

                <br>
                <button type="submit" class="btn btn-custom btn-lg">Predict Sales</button>
            </form>

            <!-- Display Prediction Result -->
            {% if prediction_text %}
            <div class="prediction-result">
                <h3>{{ prediction_text }}</h3>
            </div>
            {% endif %}

            <!-- Result Buttons -->
            <div class="result-buttons">
                <a href="/performance" class="btn btn-info btn-lg mt-3">Check Performance</a>
                <a href="/eda" class="btn btn-warning btn-lg mt-3">Generate EDA Report</a>
                
            </div>

        </div>
    </div>

</body>
</html>
